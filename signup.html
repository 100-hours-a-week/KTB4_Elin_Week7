<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header class="header">
            <button type="button" class="back-button" id="backButton">
                ‹
            </button>

            아무 말 대잔치
        </header>

        <main class="content signup-content">
            <h2 class="page-title">회원가입</h2>
            
            <form class="login-box" id="signupForm" novalidate>
                <div class="profile-area">
                    <label>프로필 사진*</label>
                    <span class="helper-text" id="profileHelper"></span>

                    <input 
                        type="file" 
                        id="profileImageInput" 
                        accept="image/*"
                        hidden
                    >

                    <button type="button" class="profile-circle" id="profileImageButton">
                        +
                    </button>
                </div>

                <div class="input-group">
                    <label for="email">이메일*</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="이메일을 입력하세요"
                    >
                    <span class="helper-text" id="emailHelper"></span>
                </div>

                <div class="input-group">
                    <label for="password">비밀번호*</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="비밀번호를 입력하세요"
                    >
                    <span class="helper-text" id="passwordHelper"></span>
                </div>

                <div class="input-group">
                    <label for="passwordCheck">비밀번호 확인*</label>
                    <input 
                        type="password" 
                        id="passwordCheck" 
                        placeholder="비밀번호를 한번 더 입력하세요"
                    >
                    <span class="helper-text" id="passwordCheckHelper"></span>
                </div>

                <div class="input-group">
                    <label for="nickname">닉네임*</label>
                    <input 
                        type="text" 
                        id="nickname" 
                        placeholder="닉네임을 입력하세요"
                    >
                    <span class="helper-text" id="nicknameHelper"></span>
                </div>

                <button type="submit" class="btn-login btn-inactive" id="signupButton">
                    회원가입
                </button>

                <button type="button" class="btn-signup" id="loginMoveButton">
                    로그인하러 가기
                </button>
            </form>
        </main>
    </div>
    <script src="./js/api.js"></script>
    <script src="./js/common.js"></script>
    <script src="./js/signup.js"></script>
</body>
</html>
