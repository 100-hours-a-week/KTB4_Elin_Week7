<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 상세조회</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header class="header">
            <button 
                type="button" 
                class="back-button"
                id="backButton"
            >
                ‹
            </button>

            아무 말 대잔치

            <div class="profile-menu-wrap">
                <button type="button" class="header-profile-button" id="profileButton">
                    <img src="./images/profile.png" alt="프로필 이미지">
                </button>

                <div class="profile-dropdown" id="profileDropdown">
                    <button type="button" class="dropdown-link" data-link="editProfile.html">
                        회원정보수정
                    </button>
                    <button type="button" class="dropdown-link" data-link="editPassword.html">
                        비밀번호수정
                    </button>
                    <button type="button" class="dropdown-link" data-link="login.html">
                        로그아웃
                    </button>
                </div>
            </div>
        </header>

        <main class="content post-detail-content">
            <section class="post-detail-container">
                <div class="post-detail-header">
                    <h2 class="detail-title" id="postTitle"></h2>

                    <div class="detail-info-row">
                        <div class="detail-author-info">
                            <div class="author-image" id="postAuthorImage"></div>
                            <span class="author-name" id="postAuthor"></span>
                            <span class="detail-date" id="postCreatedAt"></span>
                        </div>

                        <div class="detail-button-group" id="postButtonGroup" hidden>
                            <button 
                                type="button" 
                                class="small-outline-button"
                                id="editPostButton"
                            >
                                수정
                            </button>

                            <button 
                                type="button" 
                                class="small-outline-button"
                                id="postDeleteButton"
                            >
                                삭제
                            </button>
                        </div>
                    </div>
                </div>

                <img 
                    class="detail-image-box"
                    id="postImage"
                    alt="게시글 이미지"
                    style="display: none;"
                >

                <p class="detail-content-text" id="postContent"></p>

                <div class="detail-count-box">
                    <button type="button" class="count-item like-button" id="likeButton">
                        <strong id="likeCount"></strong>
                        <span>좋아요수</span>
                    </button>

                    <div class="count-item">
                        <strong class="detail-count" id="postViewCount"></strong>
                        <span>조회수</span>
                    </div>

                    <div class="count-item">
                        <strong id="commentCount"></strong>
                        <span>댓글</span>
                    </div>
                </div>

                <section class="comment-write-box">
                    <textarea 
                        id="commentInput"
                        placeholder="댓글을 남겨주세요!"
                    ></textarea>

                    <div class="comment-submit-row">
                        <button 
                            type="button" 
                            class="comment-submit-button"
                            id="commentSubmitButton"
                        >
                            댓글 등록
                        </button>
                    </div>
                </section>

                <section class="comment-list" id="commentList"></section>
            </section>
        </main>
    </div>

    <div class="modal-overlay" id="postDeleteModal">
        <div class="modal-box">
            <h3>게시글을 삭제하시겠습니까?</h3>
            <p>삭제한 내용은 복구 할 수 없습니다.</p>

            <div class="modal-button-group">
                <button 
                    type="button" 
                    class="btn-cancel"
                    id="postDeleteCancelButton"
                >
                    취소
                </button>

                <button 
                    type="button" 
                    class="btn-confirm"
                    id="postDeleteConfirmButton"
                >
                    확인
                </button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="commentDeleteModal">
        <div class="modal-box">
            <h3>댓글을 삭제하시겠습니까?</h3>
            <p>삭제한 내용은 복구 할 수 없습니다.</p>

            <div class="modal-button-group">
                <button 
                    type="button" 
                    class="btn-cancel"
                    id="commentDeleteCancelButton"
                >
                    취소
                </button>

                <button 
                    type="button" 
                    class="btn-confirm"
                    id="commentDeleteConfirmButton"
                >
                    확인
                </button>
            </div>
        </div>
    </div>

    <script src="./js/api.js"></script>
    <script src="./js/common.js"></script>
    <script src="./js/post.js"></script>
</body>
</html>
