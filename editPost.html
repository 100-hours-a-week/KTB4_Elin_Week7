<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 수정</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header class="header">
            <button 
                type="button" 
                class="back-button"
                id="backButton"
            >
                ‹
            </button>

            아무 말 대잔치

            <div class="profile-menu-wrap">
                <button type="button" class="header-profile-button" id="profileButton">
                    <img src="./images/profile.png" alt="프로필 이미지">
                </button>

                <div class="profile-dropdown" id="profileDropdown">
                    <button type="button" class="dropdown-link" data-link="editProfile.html">
                        회원정보수정
                    </button>
                    <button type="button" class="dropdown-link" data-link="editPassword.html">
                        비밀번호수정
                    </button>
                    <button type="button" class="dropdown-link" data-link="login.html">
                        로그아웃
                    </button>
                </div>
            </div>
        </header>

        <main class="content post-edit-content">
            <h2 class="page-title">게시글 수정</h2>

            <form class="post-edit-box" id="editPostForm" novalidate>
                <div class="post-form-group">
                    <label for="title">제목*</label>
                    <input 
                        type="text" 
                        id="title" 
                        value="제목 1"
                        maxlength="26"
                    >
                    <span class="helper-text" id="titleHelper"></span>
                </div>

                <div class="post-form-group">
                    <label for="content">내용*</label>
                    <textarea id="content">무엇을 얘기할까요? 아무말이라면, 삶은 항상 놀라운 모험이라고 생각합니다. 우리는 매일 새로운 경험을 하고 배우며 성장합니다. 때로는 어려움과 도전이 있지만, 그것들이 우리를 더 강하고 지혜롭게 만듭니다. 또한 우리는 주변의 사람들과 연결되어 사랑과 지지를 받습니다. 그래서 우리의 삶은 소중하고 의미가 있습니다.
자연도 아름다운 이야기입니다. 우리 주변의 자연은 끝없는 아름다움과 신비로움을 담고 있습니다. 산, 바다, 숲, 하늘 등 모든 것이 우리를 놀라게 만들고 감동시킵니다. 자연은 우리의 생활과 안정을 지키며 우리에게 쉼을 주는 곳입니다.
마지막으로, 지식을 향한 탐구는 항상 흥미로운 여정입니다. 우리는 끝없는 지식의 바다에서 배우고 발견할 수 있으며, 이것이 우리를 더 깊이 이해하고 세상을 더 넓게 보게 해줍니다.</textarea>
                    <span class="helper-text" id="contentHelper"></span>
                </div>

                <div class="post-form-group image-upload-group">
                    <label for="image">이미지</label>

                    <div class="image-upload-row">
                        <input 
                            type="file" 
                            id="image" 
                            accept="image/*"
                        >
                        <span class="file-name" id="fileName">기존 파일 명</span>
                    </div>
                </div>

                <button 
                    type="submit" 
                    class="post-submit-button active"
                    id="editPostSubmitButton"
                >
                    수정하기
                </button>
            </form>
        </main>
    </div>
    <script src="./js/api.js"></script>
    <script src="./js/common.js"></script>
    <script src="./js/editPost.js"></script>
</body>
</html>
