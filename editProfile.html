<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원정보수정</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header class="header">
            아무 말 대잔치

            <div class="profile-menu-wrap">
                <button type="button" class="header-profile-button" id="profileButton">
                    <img src="./images/profile.png" alt="프로필 이미지">
                </button>

                <div class="profile-dropdown" id="profileDropdown">
                    <button type="button" class="dropdown-link" data-link="editProfile.html">
                        회원정보수정
                    </button>
                    <button type="button" class="dropdown-link" data-link="editPassword.html">
                        비밀번호수정
                    </button>
                    <button type="button" class="dropdown-link" data-link="login.html">
                        로그아웃
                    </button>
                </div>
            </div>
        </header>

        <main class="content edit-content">
            <h2 class="page-title">회원정보수정</h2>

            <form class="login-box edit-box" id="editProfileForm" novalidate>
                <div class="edit-profile-area">
                    <label>프로필 사진*</label>

                    <button type="button" class="edit-profile-image">
                        <img id="profileImage" src="./images/profile.png" alt="프로필 이미지">
                    </button>
                </div>

                <div class="edit-input-group">
                    <label>이메일</label>
                    <p class="email-text" id="emailText">startupcode@gmail.com</p>
                </div>

                <div class="input-group">
                    <label for="nickname">닉네임</label>
                    <input 
                        type="text" 
                        id="nickname" 
                        value="스타트업코드"
                    >
                    <span class="helper-text" id="nicknameHelper"></span>
                </div>

                <button type="submit" class="btn-login btn-inactive" id="editProfileButton">
                    수정하기
                </button>

                <button type="button" class="btn-signup" id="withdrawButton">
                    회원 탈퇴
                </button>
            </form>

            <div class="toast-message" id="editProfileToast">
                수정완료
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="withdrawModal">
        <div class="modal-box">
            <h3>회원탈퇴 하시겠습니까?</h3>
            <p>작성된 게시글과 댓글은 삭제됩니다.</p>

            <div class="modal-button-group">
                <button type="button" class="btn-cancel" id="withdrawCancelButton">
                    취소
                </button>
                <button type="button" class="btn-confirm" id="withdrawConfirmButton">
                    확인
                </button>
            </div>
        </div>
    </div>
    <script src="./js/api.js"></script>
    <script src="./js/common.js"></script>
    <script src="./js/editProfile.js"></script>
</body>
</html>
