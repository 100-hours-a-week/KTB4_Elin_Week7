<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 목록조회</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header class="header">
            아무 말 대잔치

            <div class="profile-menu-wrap">
                <button type="button" class="header-profile-button" id="profileButton">
                    <img src="./images/profile.png" alt="프로필 이미지">
                </button>

                <div class="profile-dropdown" id="profileDropdown">
                    <button type="button" class="dropdown-link" data-link="editProfile.html">
                        회원정보수정
                    </button>
                    <button type="button" class="dropdown-link" data-link="editPassword.html">
                        비밀번호수정
                    </button>
                    <button type="button" class="dropdown-link" data-link="login.html">
                        로그아웃
                    </button>
                </div>
            </div>
        </header>

        <main class="content posts-content">
            <section class="posts-container">
                <p class="welcome-text">
                    안녕하세요,<br>
                    아무 말 대잔치 <strong>게시판</strong> 입니다.
                </p>

                <div class="write-button-wrap">
                    <button 
                        type="button" 
                        class="btn-write"
                        id="writePostButton"
                    >
                        게시글 작성
                    </button>
                </div>

                <section class="post-list" id="postList">
                    <article class="post-card" data-link="post.html?id=1">
                        <div class="post-card-top">
                            <h2 class="post-title">
                                제목1
                            </h2>

                            <div class="post-meta-row">
                                <div class="post-meta">
                                    <span class="post-count" data-label="좋아요" data-count="0"></span>
                                    <span class="post-count" data-label="댓글" data-count="0"></span>
                                    <span class="post-count" data-label="조회수" data-count="0"></span>
                                </div>

                                <time class="post-date" datetime="2021-01-01T00:00:00">
                                    2021-01-01 00:00:00
                                </time>
                            </div>
                        </div>

                        <div class="post-author">
                            <div class="author-image"></div>
                            <span class="author-name">더미 작성자 1</span>
                        </div>
                    </article>

                </section>
            </section>
        </main>
    </div>
    <script src="./js/api.js"></script>
    <script src="./js/posts.js"></script>
</body>
</html>
