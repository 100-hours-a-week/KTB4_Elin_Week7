<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 수정</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header class="header">
            아무 말 대잔치

            <div class="profile-menu-wrap">
                <button type="button" class="header-profile-button" id="profileButton">
                    <img src="./images/profile.png" alt="프로필 이미지">
                </button>

                <div class="profile-dropdown" id="profileDropdown">
                    <button type="button" class="dropdown-link" data-link="editProfile.html">
                        회원정보수정
                    </button>
                    <button type="button" class="dropdown-link" data-link="editPassword.html">
                        비밀번호수정
                    </button>
                    <button type="button" class="dropdown-link" data-link="login.html">
                        로그아웃
                    </button>
                </div>
            </div>
        </header>

        <main class="content password-edit-content">
            <h2 class="page-title">비밀번호 수정</h2>

            <form class="login-box password-edit-box" id="editPasswordForm" novalidate>
                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="비밀번호를 입력하세요"
                    >
                    <span class="helper-text" id="passwordHelper"></span>
                </div>

                <div class="input-group">
                    <label for="passwordCheck">비밀번호 확인</label>
                    <input 
                        type="password" 
                        id="passwordCheck" 
                        placeholder="비밀번호를 한번 더 입력하세요"
                    >
                    <span class="helper-text" id="passwordCheckHelper"></span>
                </div>

                <button type="submit" class="btn-login btn-inactive" id="editPasswordButton">
                    수정하기
                </button>
            </form>

            <div class="toast-message" id="editPasswordToast">
                수정완료
            </div>
        </main>
    </div>
    <script src="./js/api.js"></script>
    <script src="./js/editPassword.js"></script>
</body>
</html>
